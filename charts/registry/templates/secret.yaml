{{- $routingMode := .Values.global.ingress.routingMode | default "subdomain" }}
{{- $domain := .Values.global.domain | default "localhost" }}
{{- $protocol := ternary "https" "http" .Values.global.ingress.tls }}
{{- $authServerPath := .Values.global.ingress.paths.authServer | default "/auth-server" }}
{{- $registryPath := .Values.global.ingress.paths.registry | default "/registry" }}
{{- $keycloakPath := .Values.global.ingress.paths.keycloak | default "/keycloak" }}
{{- $authServerExternalUrl := "" }}
{{- $registryExternalUrl := "" }}
{{- $keycloakUrl := printf "http://%s-keycloak-headless.%s.svc.cluster.local:8080" .Release.Name .Release.Namespace}}
{{- $rootPath := "" }}
{{- $gatewayAdditionalServerNames := $domain}}
{{- if eq $routingMode "path" }}
  {{- $authServerExternalUrl = printf "%s://%s%s" $protocol $domain $authServerPath }}
  {{- $registryExternalUrl = printf "%s://%s%s" $protocol $domain $registryPath }}
  {{- $keycloakUrl = printf "%s%s" $keycloakUrl $keycloakPath }}
  {{- $rootPath = $registryPath }}
{{- else }}
  {{- $authServerExternalUrl = printf "%s://auth-server.%s" $protocol $domain }}
  {{- $registryExternalUrl = printf "%s://mcpregistry.%s" $protocol $domain }}
  {{- $gatewayAdditionalServerNames = printf "mcpregistry.%s" $domain }}
{{- end }}
{{- /* Auto-generate federation tokens if not provided */ -}}
{{- /* Resolve federation values - prefer global, fallback to local app values */ -}}
{{- $federationEnabled := .Values.app.federationStaticTokenAuthEnabled | default false }}
{{- if .Values.global.federation }}
  {{- $federationEnabled = .Values.global.federation.staticTokenAuthEnabled | default $federationEnabled }}
{{- end }}
{{- $federationStaticTokenRaw := .Values.app.federationStaticToken }}
{{- $federationEncryptionKeyRaw := .Values.app.federationEncryptionKey }}
{{- $registryId := .Values.app.registryId }}
{{- if .Values.global.federation }}
  {{- $federationStaticTokenRaw = .Values.global.federation.staticToken | default $federationStaticTokenRaw }}
  {{- $federationEncryptionKeyRaw = .Values.global.federation.encryptionKey | default $federationEncryptionKeyRaw }}
  {{- $registryId = .Values.global.federation.registryId | default $registryId }}
{{- end }}
{{- /* Generate URL-safe token (equivalent to secrets.token_urlsafe(32)) */ -}}
{{- $federationStaticToken := $federationStaticTokenRaw | default (randBytes 32 | replace "+" "-" | replace "/" "_" | trimSuffix "=") }}
{{- /* Generate Fernet-compatible key (32 random bytes, base64-encoded) */ -}}
{{- $federationEncryptionKey := $federationEncryptionKeyRaw | default (randBytes 32) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.app.envSecretName }}
  namespace: {{ .Release.Namespace | quote }}
data:
  AUTH_SERVER_EXTERNAL_URL: {{ $authServerExternalUrl | b64enc | quote }}
  AUTH_SERVER_URL: {{ printf "http://auth-server.%s.svc.cluster.local:8888" .Release.Namespace | b64enc | quote }}
  {{- if eq (.Values.global.authProvider.type | default "keycloak") "keycloak" }}
  KEYCLOAK_ADMIN: {{ (.Values.global.authProvider.keycloak.adminUsername | default "user") | b64enc | quote }}
  {{- end }}
  GATEWAY_ADDITIONAL_SERVER_NAMES: {{ $gatewayAdditionalServerNames| b64enc | quote }}
{{- if not .Values.global.oauthProviderSecretName }}
  {{/* OAuth provider vars managed per-chart in standalone deployment */}}
  AUTH_PROVIDER: {{ (.Values.global.authProvider.type | default "keycloak") | b64enc | quote }}
  {{- if eq (.Values.global.authProvider.type | default "keycloak") "keycloak" }}
  KEYCLOAK_URL: {{ $keycloakUrl | b64enc | quote }}
  KEYCLOAK_REALM: {{ (.Values.global.authProvider.keycloak.realm | default "mcp-gateway") | b64enc | quote }}
  {{- else if eq (.Values.global.authProvider.type | default "keycloak") "entra" }}
  ENTRA_CLIENT_ID: {{ .Values.entra.clientId | b64enc | quote }}
  ENTRA_CLIENT_SECRET: {{ .Values.entra.clientSecret | b64enc | quote }}
  ENTRA_TENANT_ID: {{ .Values.entra.tenantId | b64enc | quote }}
  {{- else if eq (.Values.global.authProvider.type | default "keycloak") "okta" }}
  OKTA_ENABLED: {{ "true" | b64enc | quote }}
  OKTA_DOMAIN: {{ .Values.okta.domain | b64enc | quote }}
  OKTA_CLIENT_ID: {{ .Values.okta.clientId | b64enc | quote }}
  OKTA_CLIENT_SECRET: {{ .Values.okta.clientSecret | b64enc | quote }}
  {{- if .Values.okta.m2mClientId }}
  OKTA_M2M_CLIENT_ID: {{ .Values.okta.m2mClientId | b64enc | quote }}
  {{- end }}
  {{- if .Values.okta.m2mClientSecret }}
  OKTA_M2M_CLIENT_SECRET: {{ .Values.okta.m2mClientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.okta.apiToken }}
  OKTA_API_TOKEN: {{ .Values.okta.apiToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.okta.authServerId }}
  OKTA_AUTH_SERVER_ID: {{ .Values.okta.authServerId | b64enc | quote }}
  {{- end }}
  {{- else if eq (.Values.global.authProvider.type | default "keycloak") "auth0" }}
  AUTH0_ENABLED: {{ "true" | b64enc | quote }}
  AUTH0_DOMAIN: {{ .Values.auth0.domain | b64enc | quote }}
  AUTH0_CLIENT_ID: {{ .Values.auth0.clientId | b64enc | quote }}
  AUTH0_CLIENT_SECRET: {{ .Values.auth0.clientSecret | b64enc | quote }}
  {{- if .Values.auth0.audience }}
  AUTH0_AUDIENCE: {{ .Values.auth0.audience | b64enc | quote }}
  {{- end }}
  AUTH0_GROUPS_CLAIM: {{ .Values.auth0.groupsClaim | b64enc | quote }}
  {{- if .Values.auth0.m2mClientId }}
  AUTH0_M2M_CLIENT_ID: {{ .Values.auth0.m2mClientId | b64enc | quote }}
  {{- end }}
  {{- if .Values.auth0.m2mClientSecret }}
  AUTH0_M2M_CLIENT_SECRET: {{ .Values.auth0.m2mClientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.auth0.managementApiToken }}
  AUTH0_MANAGEMENT_API_TOKEN: {{ .Values.auth0.managementApiToken | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
  ROOT_PATH: {{ $rootPath | b64enc | quote }}
  SKILL_SECURITY_SCAN_ENABLED: {{ .Values.app.skillSecurityScanEnabled | toString | b64enc | quote }}
  SKILL_SECURITY_ANALYZERS: {{ .Values.app.skillSecurityAnalyzers | b64enc | quote }}
  # ANS (Agent Name Service) Integration
  {{- if .Values.ans.enabled }}
  ANS_INTEGRATION_ENABLED: {{ "true" | b64enc | quote }}
  ANS_API_ENDPOINT: {{ .Values.ans.apiEndpoint | b64enc | quote }}
  {{- if .Values.ans.apiKey }}
  ANS_API_KEY: {{ .Values.ans.apiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.ans.apiSecret }}
  ANS_API_SECRET: {{ .Values.ans.apiSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.ans.apiTimeoutSeconds }}
  ANS_API_TIMEOUT_SECONDS: {{ .Values.ans.apiTimeoutSeconds | toString | b64enc | quote }}
  {{- end }}
  {{- if .Values.ans.syncIntervalHours }}
  ANS_SYNC_INTERVAL_HOURS: {{ .Values.ans.syncIntervalHours | toString | b64enc | quote }}
  {{- end }}
  {{- if .Values.ans.verificationCacheTtlSeconds }}
  ANS_VERIFICATION_CACHE_TTL_SECONDS: {{ .Values.ans.verificationCacheTtlSeconds | toString | b64enc | quote }}
  {{- end }}
  {{- end }}
  # Registry Card Configuration
  REGISTRY_URL: {{ (.Values.registryCard.url | default $registryExternalUrl) | b64enc | quote }}
  REGISTRY_NAME: {{ (.Values.registryCard.name | default "AI Registry") | b64enc | quote }}
  REGISTRY_ORGANIZATION_NAME: {{ (.Values.registryCard.organizationName | default "ACME Inc.") | b64enc | quote }}
  REGISTRY_DESCRIPTION: {{ (.Values.registryCard.description | default "") | b64enc | quote }}
  REGISTRY_CONTACT_EMAIL: {{ (.Values.registryCard.contactEmail | default "") | b64enc | quote }}
  REGISTRY_CONTACT_URL: {{ (.Values.registryCard.contactUrl | default "") | b64enc | quote }}
{{- if not .Values.global.sharedSecretName }}
  {{/* Federation and SECRET_KEY managed per-chart in standalone deployment */}}
  {{- if $federationEnabled }}
  FEDERATION_STATIC_TOKEN_AUTH_ENABLED: {{ $federationEnabled | toString | b64enc | quote }}
  FEDERATION_STATIC_TOKEN: {{ $federationStaticToken | b64enc | quote }}
  FEDERATION_ENCRYPTION_KEY: {{ $federationEncryptionKey | b64enc | quote }}
  {{- end }}
  {{- if $registryId }}
  REGISTRY_ID: {{ $registryId | b64enc | quote }}
  {{- end }}
  {{/* SECRET_KEY required for standalone deployment - must match auth-server's key */}}
  SECRET_KEY: {{ required "app.secretKey or global.secretKey is required for standalone deployment" (.Values.global.secretKey | default .Values.app.secretKey) | b64enc | quote }}
{{- end }}
