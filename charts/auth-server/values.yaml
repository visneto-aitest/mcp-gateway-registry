# Global configuration
global:
  image:
    repository: public.ecr.aws/p3v1o3c6/auth-server
    tag: 1.0.17
    pullPolicy: IfNotPresent

# Application configuration
app:
  name: auth-server
  replicas: 1
  envSecretName: auth-server-secret

  # External URLs
  externalUrl: http://localhost:8888

  # Security settings
  # secretKey: If not provided, a random 64-character key is auto-generated.
  # When deployed via mcp-gateway-registry-stack, the key is shared with registry.
  # Uncomment to use a specific key:
  # secretKey: "your-secure-key-here"
  sessionCookieDomain: ""  # Auto-inferred from Host header if empty
  sessionCookieSecure: true
  oauthStoreTokensInSession: false  # Store OAuth tokens in session (default: false)

  # Federation configuration
  federationStaticTokenAuthEnabled: false #If not provided, defaults to false
  federationStaticToken: # If not provided, a random token is auto-generated
  federationEncryptionKey: # If not provided, a Fernet key is auto-generated
  registryId: # Unique identifier for this registry instance (optional)

# Authentication Provider Configuration
# Choose ONE provider: keycloak, entra, okta, or auth0
authProvider:
  # Provider type: "keycloak", "entra", "okta", or "auth0"
  type: keycloak

# Keycloak integration (used when authProvider.type = "keycloak")
keycloak:
  externalUrl: http://localhost:8080
  realm: mcp-gateway

# Entra ID integration (used when authProvider.type = "entra")
entra:
  clientId: ""
  clientSecret: ""
  tenantId: ""

# Okta integration (used when authProvider.type = "okta")
okta:
  domain: ""  # e.g., dev-123456.okta.com
  clientId: ""
  clientSecret: ""
  m2mClientId: ""  # Optional: defaults to clientId
  m2mClientSecret: ""  # Optional: defaults to clientSecret
  apiToken: ""  # Optional: required for IAM operations
  authServerId: ""  # Optional: uses default Org Authorization Server if not set

# Auth0 integration (used when authProvider.type = "auth0")
auth0:
  domain: ""  # e.g., your-tenant.us.auth0.com
  clientId: ""
  clientSecret: ""
  audience: ""  # Optional: API audience for M2M tokens
  groupsClaim: "https://mcp-gateway/groups"  # Custom namespaced claim for groups
  m2mClientId: ""  # Required for IAM Management (user/role administration)
  m2mClientSecret: ""  # Required for IAM Management
  managementApiToken: ""  # Optional: alternative to M2M credentials (expires after 24h)

# Service configuration
service:
  type: ClusterIP
  port: 8888
  annotations: { }

# Resource limits and requests
resources:
  requests:
    cpu: 1
    memory: 1Gi
  limits:
    cpu: 2
    memory: 2Gi

# Ingress configuration
ingress:
  enabled: false
  className: alb
  hostname: ""
  annotations: { }
  tls: false
  # Routing mode: "subdomain" or "path"
  # - subdomain: auth-server.domain.com
  # - path: domain.com/auth-server (configurable via path setting)
  routingMode: subdomain
  # Path prefix when using path-based routing (default: /auth-server)
  path: /auth-server

nodeSelector: {}
